<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AMADEUS OS v4.1 - UNIFIED HD CORE</title>
    <link rel="stylesheet" href="css/amadeus.css">
</head>
<body>

    <div id="selector-screen">
        <div class="db-title">AMADEUS AGENT DATABASE</div>
        <div class="agent-list">
            <div class="agent-card" style="--card-accent: #a10000; --card-glow: rgba(161,0,0,0.6);" onclick="initAgent('Makise_Kurisu')">
                <img src="http://127.0.0.1:5000/uigrounds/Makise_Kurisu/profile.jpg" onerror="this.src='https://via.placeholder.com/260x300/111/a10000?text=Kurisu'">
                <div class="agent-name">MAKISE KURISU</div>
            </div>
            <div class="agent-card" style="--card-accent: #90e0ef; --card-glow: rgba(144,224,239,0.6);" onclick="initAgent('Winter_Agent')">
                <img src="http://127.0.0.1:5000/uigrounds/Winter_Agent/profile.jpg" onerror="this.src='https://via.placeholder.com/260x300/111/90e0ef?text=Winter+Agent'">
                <div class="agent-name">WINTER AGENT</div>
            </div>
        </div>
    </div>

    <div id="nixie-clock">00:00:00 - 00/00/0000</div>
    
    <div class="chat-container" id="draggable">
        <div class="header" id="drag-handle">
            <div class="header-left">
                <img id="active-profile" src="" class="avatar" onclick="this.classList.toggle('zoomed')">
                <div><strong style="color: var(--accent); font-size:16px;">AMADEUS CORE</strong><br><small id="agent-display-name" style="color:#aaa;">---</small></div>
            </div>
            <div class="voice-controls">
                <button id="voice-btn" class="v-btn" onclick="toggleVoice()">SES MOTORU: KAPALI</button>
                <button id="kill-btn" class="v-btn" style="background: #200; color:#f44; border: 1px solid #522;" onclick="killGVC()">MOTORU DURDUR</button>
                <button class="shift-btn" onclick="worldlineShift()">SAPMA KAYMASI</button>
            </div>
        </div>
        <img id="emotion-panel-bg" src="">
        <div class="messages" id="box"></div>
        <div id="blocker-msg">INITIALIZING VOICE CORE... PLEASE WAIT.</div>
        
        <div id="paste-preview-container">
            <button class="remove-img-btn" onclick="removePastedImage()">X</button>
            <img id="paste-preview-img" src="">
        </div>

        <div class="input-area">
            <input type="text" id="inp" placeholder="Mesaj göndererek veya Ctrl+V ile resmi yapıştırarak..." autocomplete="off">
            <button class="btn" id="mic">🎤</button>
            <button class="btn" id="send">➤</button>
        </div>
    </div>

    <script src="js/core.js"></script>
</body>
</html>
